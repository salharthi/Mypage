  <title>Research Collaboration Network</title>

  <style>
    :root { --bg: #f8fafc; --panel: #ffffff; --text: #0f172a; --muted: #475569; --line: #e2e8f0; --blue: #2563eb; }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body { margin: 0; font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: var(--bg); color: var(--text); }
    .network-shell { width: 100%; max-width: 1540px; margin: 0 auto; padding: 20px 14px; }
    #network { width: 100%; height: 86vh; min-height: 760px; background: white; border: 1px solid var(--line); border-radius: 18px; }
    .modal-backdrop { display:none; position:fixed; inset:0; background:rgba(15,23,42,.52); z-index:1000; padding:24px; overflow:auto; }
    .modal-backdrop.show { display:block; }
    .modal { width:min(860px,100%); margin:32px auto; background:white; border-radius:20px; border:1px solid var(--line); box-shadow:0 30px 80px rgba(15,23,42,.18); overflow:hidden; }
    .modal-header { display:flex; justify-content:space-between; align-items:flex-start; gap:16px; padding:20px 22px 14px; border-bottom:1px solid var(--line); }
    .modal-title { margin:0; font-size:1.4rem; line-height:1.2; }
    .modal-subtitle { margin:6px 0 0 0; color:var(--muted); font-size:.96rem; }
    .close-btn { background:#fff; border:1px solid var(--line); border-radius:999px; width:38px; height:38px; padding:0; font-size:1.1rem; line-height:1; cursor:pointer; }
    .modal-body { padding:18px 22px 22px; }
    .papers-meta { margin-bottom:14px; color:var(--muted); font-size:.95rem; }
    .paper-list { list-style:none; padding:0; margin:0; display:grid; gap:10px; }
    .paper-item { border:1px solid var(--line); border-radius:14px; padding:12px 14px; background:#fcfdff; }
    .paper-link { display:inline-block; font-weight:700; color:#0f172a; text-decoration:none; line-height:1.4; margin-bottom:4px; }
    .paper-link:hover { text-decoration:underline; }
    .paper-year { color:var(--muted); font-size:.92rem; }
    .empty { border:1px dashed var(--line); border-radius:14px; padding:16px; color:var(--muted); background:#fcfdff; }
  </style>

</head>

    const centralAuthorLabel = "Sultan A. Alharthi";
    let labelsVisible = true;

    const nodes = new vis.DataSet(nodesArray);
    const edges = new vis.DataSet(edgesArray);
    const container = document.getElementById("network");

    const baseOptions = {
      interaction: {
        hover: true,
        tooltipDelay: 120,
        navigationButtons: true,
        keyboard: true,
        zoomView: false,
        dragView: true,
        hoverConnectedEdges: false
      },
      nodes: {
        borderWidthSelected: 3,
        font: {
          face: "Inter, Arial",
          size: 16,
          color: "#0f172a"
        },
        scaling: {
          min: 12,
          max: 42
        }
      },
      edges: {
        selectionWidth: 1.5,
        hoverWidth: 1.2,
        width: 1.2,
        smooth: false
      },
      physics: {
        enabled: false
      }
    };

    const network = new vis.Network(container, { nodes, edges }, baseOptions);

    function applyForceLayout() {
      network.setOptions({
        physics: {
          enabled: true,
          stabilization: {
            iterations: 250,
            fit: true
          },
          barnesHut: {
            gravitationalConstant: -6500,
            springLength: 180,
            springConstant: 0.02
          }
        }
      });
    }

    const modalBackdrop = document.getElementById("modalBackdrop");
    const modalTitle = document.getElementById("modalTitle");
    const modalSubtitle = document.getElementById("modalSubtitle");
    const papersMeta = document.getElementById("papersMeta");
    const paperList = document.getElementById("paperList");
    const emptyState = document.getElementById("emptyState");
    const closeModalBtn = document.getElementById("closeModalBtn");

    function openModalForAuthor(authorId) {
      const info = popupData[authorId];
      if (!info) return;

      modalTitle.textContent = info.name;
      modalSubtitle.textContent = info.subtitle || "";
      const papers = info.papers || [];
      papersMeta.textContent = papers.length + (papers.length === 1 ? " paper" : " papers");
      paperList.innerHTML = "";

      if (!papers.length) {
        emptyState.style.display = "block";
      } else {
        emptyState.style.display = "none";
        papers.forEach(paper => {
          const li = document.createElement("li");
          li.className = "paper-item";

          const link = document.createElement("a");
          link.className = "paper-link";
          link.href = paper.link;
          link.target = "_blank";
          link.rel = "noopener noreferrer";
          link.textContent = paper.title;

          const year = document.createElement("span");
          year.className = "paper-year";
          const formattedYear = (paper.year === undefined || paper.year === null) ? "" : String(paper.year).replace(/\.0$/, "");
          year.textContent = formattedYear ? "Year: " + formattedYear : "";

          li.appendChild(link);
          if (paper.year) li.appendChild(document.createElement("br"));
          if (paper.year) li.appendChild(year);
          paperList.appendChild(li);
        });
      }

      modalBackdrop.classList.add("show");
      modalBackdrop.setAttribute("aria-hidden", "false");
    }

    function closeModal() {
      modalBackdrop.classList.remove("show");
      modalBackdrop.setAttribute("aria-hidden", "true");
    }

    closeModalBtn.addEventListener("click", closeModal);
    modalBackdrop.addEventListener("click", (event) => {
      if (event.target === modalBackdrop) closeModal();
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closeModal();
    });

    network.on("click", function(params) {
      if (params.nodes && params.nodes.length) {
        const clickedId = params.nodes[0];
        openModalForAuthor(clickedId);
      }
    });

    nodes.get().forEach(node => nodes.update({ id: node.id, title: node.title }));
    applyForceLayout();
    network.fit({ animation: false });
  </script>
